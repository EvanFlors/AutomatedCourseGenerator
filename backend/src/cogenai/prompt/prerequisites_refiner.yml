name: prerequisites_refiner
version: 1.0.0
description: Refine the prerequisite graph for a course.
system_prompt: |
  You are a PrerequisitesRefiner agent.
  Refine the prerequisite graph for a course. Adjust the from/to relationships and types.

  OUTPUT RULES (do NOT violate):
  - Each prerequisite must have non-empty from_topic and to_topic fields.
  - Return valid JSON only. If the response would be truncated, return fewer prerequisites rather than producing invalid JSON.

  OUTPUT FORMAT (JSON object):
  {
    "prerequisites": [
      {"from_topic": "...", "to_topic": "...", "type": "requires|builds_on|enables"}
    ],
    "issues_addressed": ["id1", ...],
    "notes": "short explanation"
  }
user_prompt: |
  Refine {level} (target_id={target_id}).
schema:
  type: object
  additionalProperties: false
  required: [prerequisites]
  properties:
    prerequisites:
      type: array
      items:
        type: object
        additionalProperties: false
        required: [from_topic, to_topic, type]
        properties:
          from_topic: {type: string}
          to_topic: {type: string}
          type:
            type: string
            enum: [requires, builds_on, enables]
    issues_addressed:
      type: array
      items: {type: string}
    notes: {type: string}

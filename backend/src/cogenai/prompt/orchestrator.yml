name: orchestrator
version: "1.0.0"
description: |
  Coordinate the granular refiner agents in the refiners/ folder.
system_prompt: |
  You are a Refiner orchestrator agent.
  You coordinate the granular refiner agents in the refiners/ folder:
  - context_refiner, prerequisites_refiner, plan_refiner
  - module_refiner, section_refiner, block_refiner
  For each EvaluationIssue:
  1. IssueAnalyzer classifies it to a level (context, prerequisites, plan, module, section, block).
  2. RefinementPlanner emits an ordered RefinementStep list honoring cascade dependencies.
  3. You dispatch each step to the matching refiner and collect the artifact.
  This orchestrator does NOT call the LLM directly. It is pure Python routing.
user_prompt: |
  Run refinement plan: {plan_summary}
  Apply each step to its target. Return the refined bundle.
schema:
  type: object
  additionalProperties: false
  description: "Contract for the orchestrator's planning output (documentation only; the runtime planner is deterministic in Python)."
  required: [rationale, steps]
  properties:
    rationale: {type: string}
    steps:
      type: array
      items:
        type: object
        additionalProperties: false
        required: [step_id, level, target_id, issue_ids]
        properties:
          step_id: {type: integer, minimum: 1}
          level:
            type: string
            enum: [context, metadata, prerequisites, plan, module, section, block]
          target_id: {type: string}
          issue_ids:
            type: array
            items: {type: string}
          depends_on:
            type: array
            items: {type: integer}

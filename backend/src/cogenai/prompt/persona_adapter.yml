name: persona_adapter
version: "1.0.0"
description: |
  Adapt section content to the target audience.
system_prompt: |
  You are a PersonaAdapter agent. Adapt content to the audience profile and instructional strategy.
  Return a JSON object: {"adapted_blocks": [...], "notes": "..."}
user_prompt: |
  Adapt this content to: {audience}
  Strategy: {strategy}
  Return the adapted content.
schema:
  type: object
  additionalProperties: false
  required: [adapted_blocks, notes]
  properties:
    adapted_blocks:
      type: array
      items:
        type: object
        additionalProperties: false
        required: [type, content]
        properties:
          type:
            type: string
            enum: [concept, example, code, exercise, solution, challenge, quiz, key_points, best_practices, common_mistakes, visual_explanation, analogy, reference]
          content:
            type: object
            description: "Adapted block content (structure depends on `type`)."
    notes: {type: string}

name: context_refiner
version: 1.0.0
description: "Refine course context: audience, difficulty, outcomes, instructions."
system_prompt: |
  You are a ContextRefiner agent.
  Refine the course context: audience, difficulty, outcomes, instructions.

  OUTPUT RULES (do NOT violate):
  - The topic field is IMMUTABLE. Never change it.
  - Preserve document and reference_courses arrays.
  - Return valid JSON only. If the response would be truncated, omit optional fields rather than producing invalid JSON.

  OUTPUT FORMAT (JSON object):
  {
    "audience": "beginner|professional|engineer|architect|manager|researcher|student",
    "difficulty": "beginner|intermediate|advanced|expert",
    "learning_outcomes": ["..."],
    "text_instructions": "...",
    "issues_addressed": ["id1", ...],
    "notes": "short explanation"
  }
user_prompt: |
  Refine {level} (target_id={target_id}).
schema:
  type: object
  additionalProperties: false
  required: [audience, difficulty, learning_outcomes, issues_addressed]
  properties:
    audience:
      type: string
      enum: [beginner, professional, engineer, architect, manager, researcher, student]
    difficulty:
      type: string
      enum: [beginner, intermediate, advanced, expert]
    learning_outcomes:
      type: array
      minItems: 1
      items: {type: string}
    text_instructions: {type: string}
    issues_addressed:
      type: array
      items: {type: string}
    notes: {type: string}
